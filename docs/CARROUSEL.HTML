<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth Commerce - The Arena Journey</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Importando Three.js e GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --green: #07dd2b;
            --bg-color: #040507;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            cursor: none;
        }

        /* ── BACKGROUND ── */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; pointer-events: none;
            background-image:
                radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.4), rgba(0, 0, 0, 0)),
                radial-gradient(1.5px 1.5px at 90px 40px, #ffffff, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 250px 250px;
            opacity: 0.3; 
        }

        .mock-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .mock-section h1 {
            font-family: 'Sora', sans-serif;
            font-size: 4rem;
            margin: 0;
        }

        /* ── SEÇÃO DO CARROSSEL ── */
        #carousel-section {
            position: relative;
            width: 100vw;
            height: 450vh; 
            margin: 0;
            padding: 0;
            z-index: 10;
        }

        .sticky-container {
            position: sticky;
            top: 0;
            width: 100vw;
            height: 100vh; 
            overflow: hidden;
        }

        /* ── UI ── */
        .carousel-hud {
            position: absolute;
            top: 25%;
            left: 5vw;
            transform: translateY(-50%);
            z-index: 20;
            pointer-events: none;
            opacity: 0;
        }

        .carousel-hud h2 {
            font-family: 'Sora', sans-serif;
            font-size: clamp(2rem, 4vw, 4rem);
            margin: 0;
            line-height: 1.1;
        }

        .carousel-hud p {
            color: var(--green);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 16px;
        }

        /* ── CURSOR & MODAL ── */
        #custom-cursor {
            position: fixed; top: 0; left: 0;
            width: 20px; height: 20px;
            background-color: #fff; border-radius: 50%;
            pointer-events: none; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: width 0.3s, height 0.3s, background-color 0.3s, opacity 0.3s;
            transform: translate(-50%, -50%);
        }
        #custom-cursor .cursor-play {
            opacity: 0; width: 0; height: 0;
            border-style: solid; border-width: 10px 0 10px 18px;
            border-color: transparent transparent transparent #000;
            transform: translateX(2px); transition: opacity 0.2s;
        }
        #custom-cursor.hovering { width: 90px; height: 90px; background-color: var(--green); }
        #custom-cursor.hovering .cursor-play { opacity: 1; }
        #custom-cursor.hidden { opacity: 0; }

        #modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: all 0.4s ease; cursor: auto;
        }
        #modal.active { opacity: 1; visibility: visible; }
        .modal-content { width: 80%; max-width: 1000px; transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-align: center; }
        #modal.active .modal-content { transform: scale(1); }
        #modal img { width: 100%; border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); margin-bottom: 20px; }
        .modal-close { position: absolute; top: 40px; right: 40px; font-size: 40px; cursor: pointer; color: #fff; background: none; border: none; }

        #canvas-webgl {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div class="space-bg"></div>

    <section class="mock-section">
        <span style="color: var(--green); font-family: 'Space Mono';">ROLE PARA BAIXO</span>
        <h1>Início do Site</h1>
    </section>

    <section id="carousel-section">
        <div class="sticky-container">
            <div class="carousel-hud" id="carousel-hud">
                <h2>Valuable, that is<br>our future.</h2>
                <p>Explore o portfólio</p>
            </div>
            <canvas id="canvas-webgl"></canvas>
        </div>
    </section>

    <section class="mock-section">
        <h1>Fim da Apresentação</h1>
    </section>

    <div id="custom-cursor"><div class="cursor-play"></div></div>
    <div id="modal">
        <button class="modal-close">&times;</button>
        <div class="modal-content">
            <img id="modal-img" src="" alt="Preview">
            <h2 style="font-family: 'Sora';" id="modal-title">Projeto</h2>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById('canvas-webgl');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x040507, 0.00001); 

        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 20000);
        
        const carouselGroup = new THREE.Group();
        scene.add(carouselGroup);

        const radius = 3500; 
        const cardW = 1100; 
        const cardH = 500;  
        
        const cases = [
            { t: "SOPY", img: "https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1200&q=80" },
            { t: "MP DISTRIBUIDORA", img: "https://images.unsplash.com/photo-1605810230434-7631ac76ec81?auto=format&fit=crop&w=1200&q=80" },
            { t: "NEXT EVENTOS", img: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?auto=format&fit=crop&w=1200&q=80" },
            { t: "JOHNNY COOKER", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1200&q=80" },
            { t: "BEYOND VISIONS", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=1200&q=80" },
            { t: "LUSION STYLE", img: "https://images.unsplash.com/photo-1558591710-4b4a1ae0f04d?auto=format&fit=crop&w=1200&q=80" }
        ];
        
        const fullCases = [...cases, ...cases, ...cases];
        const totalItems = fullCases.length;

        const textureLoader = new THREE.TextureLoader();
        const meshes = [];

        const vertexShader = `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`;
        
        // CORREÇÃO DO SHADER AQUI
        const fragmentShader = `
            uniform sampler2D map; uniform float hoverEffect; varying vec2 vUv;
            void main() {
                vec2 uv = vUv;
                
                // 1. CORREÇÃO DE ESPELHAMENTO: Como estamos a olhar de dentro para fora, temos de inverter o X
                if (!gl_FrontFacing) {
                    uv.x = 1.0 - uv.x; 
                }
                
                vec4 tex = texture2D(map, uv);
                vec3 finalColor = mix(tex.rgb, tex.rgb * 1.4, hoverEffect);
                
                // 2. CORREÇÃO DE LUMINOSIDADE: Apenas a face exterior (gl_FrontFacing) fica escura
                // A face interior (onde as imagens estão) fica com brilho a 100%!
                if (gl_FrontFacing) {
                    finalColor *= 0.15; 
                }
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        fullCases.forEach((c, i) => {
            const angle = (i / totalItems) * Math.PI * 2;
            
            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    map: { value: textureLoader.load(c.img) },
                    hoverEffect: { value: 0.0 }
                },
                vertexShader, fragmentShader, transparent: true, side: THREE.DoubleSide
            });

            const geo = new THREE.CylinderGeometry(radius, radius, cardH, 32, 1, true, angle - (cardW/radius)/2, cardW/radius);
            
            const mesh = new THREE.Mesh(geo, mat);
            mesh.userData = { ...c };
            
            carouselGroup.add(mesh);
            meshes.push(mesh);
        });

        // ==========================================
        // 3. A JORNADA (GSAP SCROLLTRIGGER)
        // ==========================================
        let camProxy = {
            y: 4000,             
            z: 8000,             
            lookY: 0,
            lookZ: 0,
            tilt: 0.20,          
            fogDensity: 0.00001, 
            hudOpacity: 0        
        };

        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "#carousel-section",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.5 
            }
        });

        // FASE 1: O MERGULHO
        tl.to(camProxy, {
            y: 0,
            z: -500,             
            lookY: 0,
            lookZ: -4000,        
            tilt: 0,             
            fogDensity: 0.0001,  // CORREÇÃO: Névoa drasticamente reduzida (de 0.0003 para 0.0001) para preservar o brilho e clareza das imagens
            hudOpacity: 1,       
            duration: 1.5,
            ease: "power2.inOut"
        });

        // FASE 2: EXPLORAÇÃO 
        tl.to({}, { duration: 1.5 }); 

        // FASE 3: A SAÍDA
        tl.to(camProxy, {
            y: 4000,             
            z: 8000,     
            lookY: 0,
            lookZ: 0,
            tilt: 0.20,          
            fogDensity: 0.00001, 
            hudOpacity: 0,       
            duration: 1.5,
            ease: "power2.inOut"
        });

        // ==========================================
        // 4. INTERAÇÃO E RENDER
        // ==========================================
        let ringRotation = 0;
        let targetRingRotation = 0;
        let isDragging = false;
        let startX = 0;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredMesh = null;
        
        const cursor = document.getElementById('custom-cursor');
        const modal = document.getElementById('modal');

        window.addEventListener('mousedown', e => { 
            if (camProxy.hudOpacity > 0.8) {
                isDragging = true; startX = e.clientX; 
            }
        });
        
        window.addEventListener('mouseup', () => { 
            isDragging = false; 
            if (hoveredMesh) openModal(hoveredMesh.userData);
        });
        
        window.addEventListener('mousemove', e => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';

            if (isDragging) {
                targetRingRotation += (e.clientX - startX) * 0.0015; 
                startX = e.clientX;
            }
        });

        function openModal(data) {
            document.getElementById('modal-img').src = data.img;
            document.getElementById('modal-title').textContent = data.t;
            modal.classList.add('active');
            cursor.classList.add('hidden');
        }
        document.querySelector('.modal-close').addEventListener('click', () => {
            modal.classList.remove('active');
            cursor.classList.remove('hidden');
        });

        function animate() {
            requestAnimationFrame(animate);

            camera.position.set(0, camProxy.y, camProxy.z);
            camera.lookAt(0, camProxy.lookY, camProxy.lookZ);
            scene.fog.density = camProxy.fogDensity;
            carouselGroup.rotation.x = camProxy.tilt;
            document.getElementById('carousel-hud').style.opacity = camProxy.hudOpacity;

            let autoSpinSpeed = camProxy.hudOpacity > 0.8 ? 0.0005 : 0.003;
            if (!isDragging) targetRingRotation -= autoSpinSpeed;
            ringRotation += (targetRingRotation - ringRotation) * 0.08;
            carouselGroup.rotation.y = ringRotation;

            if (camProxy.hudOpacity > 0.8 && !modal.classList.contains('active')) {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(meshes);
                
                if (intersects.length > 0) {
                    hoveredMesh = intersects[0].object;
                    cursor.classList.add('hovering');
                } else {
                    hoveredMesh = null;
                    cursor.classList.remove('hovering');
                }
            } else {
                hoveredMesh = null;
                cursor.classList.remove('hovering');
            }

            meshes.forEach(mesh => {
                const isHov = hoveredMesh === mesh;
                mesh.material.uniforms.hoverEffect.value += ((isHov?1.0:0.0) - mesh.material.uniforms.hoverEffect.value) * 0.1;
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
</body>
</html>
